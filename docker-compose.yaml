  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    env_file:
      - ./.env
    volumes:
      - 'rabbitmq_data:/data'
    networks:
    - flask_api_network  

volumes:
  flask_api:
  rabbitmq_data:
  #grafana_data:
