
services:
  flask_api:
    container_name: ms_flask_api
    ports:
      - 5000:5000
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    depends_on:
      - rabbitmq
      # - prometheus
      # - grafana
    networks:
      - flask_api_network
    volumes:
      - flask_api:/app
    restart: always

