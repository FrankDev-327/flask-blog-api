# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application
on:
  push:
    branches: [ "dev" ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.dev.txt ]; then pip install -r requirements.dev.txt; fi
    - name: Lint with flake8
      run: |
        echo "stop the build if there are Python syntax errors or undefined names"
        flake8 . --show-source --statistics
        echo "exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide"
        flake8 . --count --exit-zero

  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies for migration
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.dev.txt ]; then pip install -r requirements.dev.txt; fi
    - name: Test SQLAlchemy connection
      env:
        DB_URL: ${{ secrets.NEON_DB_URL }}
      run: |
        python - <<EOF
        from sqlalchemy import create_engine
        engine = create_engine("${DB_URL}")
        with engine.connect() as conn:
            print(conn.execute("SELECT 1").fetchall())
        EOF

    - name: Run database migrations
      env:
        PORT: 5000
        NEON_DB_URL: ${{ vars.NEON_DB_URL }}
        REDIS_CLOUD_HOST: ${{ vars.REDIS_CLOUD_HOST }}
        REDIS_CLOUD_PORT: ${{ vars.REDIS_CLOUD_PORT }}
        REDIS_CLOUD_PASSWORD: ${{ vars.REDIS_CLOUD_PASSWORD }}
        REDIS_CLOUD_USERNAME: ${{ vars.REDIS_CLOUD_USERNAME }}
      run: |
        flask db upgrade



