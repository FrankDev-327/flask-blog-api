# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application
on:
  push:
    branches: [ "dev" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install PostgreSQL client
      run: sudo apt-get update && sudo apt-get install -y postgresql-client

    # Debug (optional but VERY useful)
    - name: Check if DB URL is set
      env:
        DB_URL: ${{ secrets.NEON_DB_URL }}
      run: |
        if [ -z "$DB_URL" ]; then
          echo "❌ NEON_DB_URL is EMPTY"
          exit 1
        else
          echo "✅ NEON_DB_URL is set"
        fi

    # Wait + test connection
    - name: Test Neon DB connection
      env:
        DB_URL: ${{ secrets.NEON_DB_URL }}
      run: |
        echo "Attempting DB connection..."
        psql "$DB_URL" -c "SELECT 1;" || (echo "❌ DB connection failed" && exit 1)

    - name: Test Neon DB connection
      run: |
        psql "${{ secrets.NEON_DB_URL }}" -c "SELECT 1;"

    - uses: actions/checkout@v6
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.dev.txt ]; then pip install -r requirements.dev.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero
