name: Python application

on:
  push:
    branches: ["dev", "main"]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.10"

jobs:
# -------------------------
# Debug job
# -------------------------
  printing_action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print GitHub context
        run: |
          echo '${{ toJSON(github) }}'

# -------------------------
# Linting
# -------------------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python with cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.dev.txt

      - name: Lint
        run: |
          echo "stop the build if there are Python syntax errors or undefined names"
          flake8 . --show-source --statistics
          echo "exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide"
          flake8 . --count --exit-zero

# -------------------------
# Run migrations
# -------------------------
  migration:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python with cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.dev.txt

      - name: Run database migrations
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          REDIS_CLOUD_HOST: ${{ secrets.REDIS_CLOUD_HOST }}
          REDIS_CLOUD_PORT: ${{ secrets.REDIS_CLOUD_PORT }}
          REDIS_CLOUD_PASSWORD: ${{ secrets.REDIS_CLOUD_PASSWORD }}
          REDIS_CLOUD_USERNAME: ${{ secrets.REDIS_CLOUD_USERNAME }}
        run: |
          flask db upgrade

# -------------------------
# Testing
# -------------------------
  testing:
    runs-on: ubuntu-latest
    needs: migration

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python with cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.dev.txt

      - name: Start Flask app
        env:
          PORT: 5000
          FLASK_APP: app.py
          FLASK_DEBUG: 1
          FLASK_RUN_RELOAD: false
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          REDIS_CLOUD_HOST: ${{ secrets.REDIS_CLOUD_HOST }}
          REDIS_CLOUD_PORT: ${{ secrets.REDIS_CLOUD_PORT }}
          REDIS_CLOUD_PASSWORD: ${{ secrets.REDIS_CLOUD_PASSWORD }}
          REDIS_CLOUD_USERNAME: ${{ secrets.REDIS_CLOUD_USERNAME }}
        run: |
          flask run --host=0.0.0.0 --port=5000 &
          sleep 5 
          curl -X POST http://127.0.0.1:5000/api/user -d '{
            "name": "test_user_20",
            "password": "123456789",
            "nick_name": "test_user_20",
            "email": "test_user_20@test.com"
          }' -H "Content-Type: application/json"
          pytest tests || echo "Tests failed horrible..."

# -------------------------
# Cleanup DB
# -------------------------
  cleaning_db:
    runs-on: ubuntu-latest
    needs: testing
    if: always()

    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Drop all tables
        env:
          DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          echo dropping all tables
          psql "$DB_URL" -c "DROP SCHEMA public CASCADE;"
          echo recreating scema
          psql "$DB_URL" -c "CREATE SCHEMA public;"

# -------------------------
# Build Docker image
# -------------------------
  build_container:
    runs-on: ubuntu-latest
    needs: cleaning_db
    if: ${{ github.ref == 'refs/heads/main' }}

    steps:
      - run: echo "Fake building to production server on branch $GITHUB_REF"
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t flask-app:latest .

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          body: |
            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "GitHub Actions - Build Status"
          to: andramelech27@gmail.com, francisco.gonzalez@artronic.net
          from: ${{ github.repository_owner }}