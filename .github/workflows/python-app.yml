# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application
on:
  push:
    branches: [ "dev" ]

permissions:
  contents: read

jobs:
  printing_action:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: printing github action format as json
      run: |
          echo GitAction toJSON(github)

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.dev.txt ]; then pip install -r requirements.dev.txt; fi
    - name: Lint with flake8
      run: |
        echo "stop the build if there are Python syntax errors or undefined names"
        flake8 . --show-source --statistics
        echo "exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide"
        flake8 . --count --exit-zero

  testing:
    runs-on: ubuntu-latest
    needs: migration

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies for migration
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.dev.txt ]; then pip install -r requirements.dev.txt; fi
    - name: Running testing
      env:
        PORT: 5000
        FLASK_APP: "app.py"
        DEBUG_MODE: True
        FLASK_DEBUG: 1
        FLASK_RUN_RELOAD: False
        NEON_DB_URL: ${{ vars.NEON_DB_URL }}
        REDIS_CLOUD_HOST: ${{ vars.REDIS_CLOUD_HOST }}
        REDIS_CLOUD_PORT: ${{ vars.REDIS_CLOUD_PORT }}
        REDIS_CLOUD_PASSWORD: ${{ vars.REDIS_CLOUD_PASSWORD }}
        REDIS_CLOUD_USERNAME: ${{ vars.REDIS_CLOUD_USERNAME }}
      run: |
        flask run --host=0.0.0.0 --port=5000 &

        sleep 5 

           curl -X POST http://127.0.0.1:5000/api/user -d '{
          "name": "test_user_20",
          "password": "123456789",
          "nick_name": "test_user_20",
          "email": "test_user_20@test.com"
        }' -H "Content-Type: application/json"

        pytest tests || echo "Tests failed horrible..."

  cleaning_db:
    runs-on: ubuntu-latest
    needs: testing
    if: always()

    steps:
    - name: Install PostgreSQL client
      run: sudo apt-get update && sudo apt-get install -y postgresql-client
    - name: Drop all tables
      env:
        DB_URL: ${{ vars.NEON_DB_URL }}
      run: |
        psql "$DB_URL" -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"

  migration:
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies for migration
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.dev.txt ]; then pip install -r requirements.dev.txt; fi

    - name: Run database migrations
      env:
        PORT: 5000
        NEON_DB_URL: ${{ vars.NEON_DB_URL }}
        REDIS_CLOUD_HOST: ${{ vars.REDIS_CLOUD_HOST }}
        REDIS_CLOUD_PORT: ${{ vars.REDIS_CLOUD_PORT }}
        REDIS_CLOUD_PASSWORD: ${{ vars.REDIS_CLOUD_PASSWORD }}
        REDIS_CLOUD_USERNAME: ${{ vars.REDIS_CLOUD_USERNAME }}
      run: |
        flask db upgrade

  build_container:
    runs-on: ubuntu-latest
    needs: cleaning_db

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker Image
      run: |
        docker build -t flask-app:latest .







